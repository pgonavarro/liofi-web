<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" width="620" height="220">
  <defs>
    <symbol id="lf-strawberry" viewBox="0 0 180 200">
      <polygon points="78,18 90,55 102,18" fill="none" stroke="#14171A" stroke-width="7" stroke-linejoin="round"/>
      <polygon points="62,28 90,55 70,22" fill="none" stroke="#14171A" stroke-width="7" stroke-linejoin="round"/>
      <polygon points="118,28 90,55 110,22" fill="none" stroke="#14171A" stroke-width="7" stroke-linejoin="round"/>
      <polygon points="90,55 60,40 35,60 25,100 45,150 90,185 135,150 155,100 145,60 120,40"
               fill="none" stroke="#14171A" stroke-width="8" stroke-linejoin="round"/>
      <polygon points="90,55 120,40 145,60 130,85" fill="#C81E3A"/>
    </symbol>

    <symbol id="lf-pineapple" viewBox="0 0 180 220">
      <polygon points="90,75 60,30 75,10" fill="none" stroke="#14171A" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="90,75 90,22 100,5" fill="none" stroke="#14171A" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="90,75 120,30 105,10" fill="none" stroke="#14171A" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="90,75 45,45 35,22" fill="none" stroke="#14171A" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="90,75 135,45 145,22" fill="none" stroke="#14171A" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="60,75 120,75 142,112 136,170 90,200 44,170 38,112"
               fill="none" stroke="#14171A" stroke-width="8" stroke-linejoin="round"/>
      <g stroke="#14171A" stroke-width="2.5" opacity="0.55">
        <line x1="44" y1="170" x2="142" y2="112"/>
        <line x1="38" y1="112" x2="136" y2="170"/>
        <line x1="60" y1="75" x2="90" y2="200"/>
        <line x1="120" y1="75" x2="90" y2="200"/>
      </g>
      <polygon points="90,140 119,123 136,141 119,170 90,170" fill="#C81E3A"/>
    </symbol>

    <!-- MANGO — new hero icon. Asymmetric teardrop, faceted, single stem leaf.
         Replaces manzana: best yield + best profit% of any fruit in the dataset. -->
    <symbol id="lf-mango" viewBox="0 0 180 210">
      <line x1="95" y1="32" x2="92" y2="10" stroke="#14171A" stroke-width="7"/>
      <polygon points="92,16 118,8 104,28" fill="none" stroke="#14171A" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="95,32 128,46 150,88 146,138 112,178 68,182 36,142 33,92 56,46"
               fill="none" stroke="#14171A" stroke-width="8" stroke-linejoin="round"/>
      <polygon points="95,32 128,46 150,88 118,100" fill="#C81E3A"/>
    </symbol>
  </defs>

  <use href="#lf-strawberry" x="10" y="10" width="170" height="190"/>
  <use href="#lf-mango" x="220" y="0" width="180" height="220"/>
  <use href="#lf-pineapple" x="430" y="0" width="180" height="220"/>
</svg>
